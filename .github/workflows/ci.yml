name: CI

on:
  push:
  pull_request:

jobs:
  rust-python-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python build deps
        run: python -m pip install --upgrade pip maturin

      - name: Build extension wheel
        run: python -m maturin build --release -i python

      - name: Install extension wheel
        run: python -m pip install --force-reinstall target/wheels/*.whl

      - name: Run wrapper tests
        run: python python/test_wrapper.py
